name: Android Build

on:
 push:
 branches: [ main, master ]
 paths:
 - 'app/**'
 - 'More/**'
 - '.github/workflows/Android.yml'
 pull_request:
 branches: [ main, master ]
 workflow_dispatch:

jobs:
 build:
 name: Build APK
 runs-on: ubuntu-latest

 steps:
 - name: Checkout repository
 uses: actions/checkout@v4
 with:
 fetch-depth: 0

 - name: Set up JDK 17
 uses: actions/setup-java@v4
 with:
 distribution: 'temurin'
 java-version: '17'
 cache: gradle

 - name: Set up Android SDK
 uses: android-actions/setup-android@v3
 with:
 api-level: 34
 build-tools-version: '34.0.0'
 ndk-version: 'r26b'

 - name: Cache Gradle dependencies
 uses: actions/cache@v4
 with:
 path: |
 ~/.gradle/caches
 ~/.gradle/wrapper
 .gradle
 key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
 restore-keys: |
 gradle-${{ runner.os }}-

 - name: Grant execute permission for gradlew
 run: chmod +x gradlew

 - name: Create local.properties
 run: |
 echo "sdk.dir=$ANDROID_HOME" > local.properties

 - name: Copy More directory
 run: |
 mkdir -p app/src/main/java/com/x/launcher/more
 if [ -d "More" ]; then
 cp More/*.kt app/src/main/java/com/x/launcher/more/
 fi

 - name: Run Lint
 run: ./gradlew lintDebug --no-daemon

 - name: Build Debug APK
 run: ./gradlew assembleDebug --no-daemon --stacktrace

 - name: Build Release APK
 run: ./gradlew assembleRelease --no-daemon --stacktrace

 - name: Sign Release APK
 if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
 uses: r0adkll/sign-android-release@v1
 id: sign_release
 with:
 releaseDirectory: app/build/outputs/apk/release
 signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
 alias: ${{ secrets.KEY_ALIAS }}
 password: ${{ secrets.KEY_PASSWORD }}
 keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
 env:
 BUILD_TOOLS_VERSION: '34.0.0'

 - name: Upload Debug APK
 uses: actions/upload-artifact@v4
 with:
 name: launcher-debug
 path: app/build/outputs/apk/debug/*.apk
 retention-days: 30

 - name: Upload Release APK
 uses: actions/upload-artifact@v4
 with:
 name: launcher-release
 path: app/build/outputs/apk/release/*.apk
 retention-days: 30

 - name: Upload Lint Reports
 if: always()
 uses: actions/upload-artifact@v4
 with:
 name: lint-reports
 path: |
 app/build/reports/lint-results-debug.html
 app/build/reports/lint-results-debug.xml
 retention-days: 14

 release:
 name: Create Release
 needs: build
 if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
 runs-on: ubuntu-latest

 steps:
 - name: Checkout repository
 uses: actions/checkout@v4
 with:
 fetch-depth: 0

 - name: Download Release APK
 uses: actions/download-artifact@v4
 with:
 name: launcher-release
 path: artifacts/

 - name: Get version name
 id: version
 run: |
 VERSION=$(grep -oP 'versionName = "[^"]+"' app/build.gradle.kts | head -1 | cut -d'"' -f2)
 if [ -z "$VERSION" ]; then
 VERSION=$(grep -oP 'versionName "[^"]+"' app/build.gradle | head -1 | cut -d'"' -f2)
 fi
 if [ -z "$VERSION" ]; then
 VERSION="1.0.0-$(date +'%Y%m%d%H%M%S')"
 fi
 echo "version=$VERSION" >> $GITHUB_OUTPUT
 echo "Building version: $VERSION"

 - name: Rename APK
 run: |
 cd artifacts
 for file in *.apk; do
 mv "$file" "X-Launcher-${{ steps.version.outputs.version }}.apk"
 done

 - name: Create GitHub Release
 uses: softprops/action-gh-release@v2
 with:
 tag_name: v${{ steps.version.outputs.version }}
 name: X Launcher v${{ steps.version.outputs.version }}
 draft: true
 prerelease: false
 generate_release_notes: true
 files: artifacts/*.apk
 body: |
 ## X Launcher v${{ steps.version.outputs.version }}

 ### What's New
 - Built from commit ${{ github.sha }}
 - Build date: ${{ github.run_id }}

 ### Modules
 - ✅ Core Launcher
 - ✅ XOP (Optimization Layer)
 - ✅ X Client (Integrated Client Features)
 - ✅ More Features (Crash Analyzer, Repair, Profiles, etc.)

 ### Installation
 Download the APK and install on your device.
 Requires Android 8.0+ (API 26+).
 env:
 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

 notify:
 name: Notify Build Status
 needs: [build, release]
 if: always()
 runs-on: ubuntu-latest

 steps:
 - name: Build Status Summary
 run: |
 echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
 echo "" >> $GITHUB_STEP_SUMMARY
 echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
 echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
 echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
 echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
 echo "" >> $GITHUB_STEP_SUMMARY
 echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
 echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
